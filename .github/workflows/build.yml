name: Build SparkDuels From ZIP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip SparkDuels.zip -d extracted
          find extracted -name "pom.xml"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: |
          PROJECT_DIR=$(dirname $(find extracted -name "pom.xml" | head -n 1))
          echo "Building project in $PROJECT_DIR"
          mvn -B package --file "$PROJECT_DIR/pom.xml"

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: Spark-Practice
          path: extracted/**/target/*.jar
          if-no-files-found: error
